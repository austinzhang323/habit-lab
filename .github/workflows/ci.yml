name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # prisma generate never connects to the DB — a placeholder just
          # needs to be non-empty to satisfy prisma.config.ts's env() check.
          DIRECT_DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # No page statically imports prisma (all DB access is behind API
          # routes), so the build never actually connects — only needs a
          # non-empty, well-formed value to satisfy src/lib/prisma.ts.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          DIRECT_DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # prisma generate never connects to the DB — a placeholder just
          # needs to be non-empty to satisfy prisma.config.ts's env() check.
          DIRECT_DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
        env:
          # migrate deploy runs DDL, so it connects via the DIRECT (postgres://)
          # URL — prisma.config.ts reads env("DIRECT_DATABASE_URL") for the
          # datasource. DATABASE_URL is passed for parity with migrate.yml.
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.TEST_DIRECT_DATABASE_URL }}

      - name: Smoke-check the test database connection
        run: npx tsx scripts/db-smoke.ts
        env:
          # Runs one real query through the app's own Accelerate path
          # (src/lib/prisma.ts uses DATABASE_URL) to prove the connection is
          # real, not just that the secrets are set.
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.TEST_DIRECT_DATABASE_URL }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST: "1"
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.TEST_DIRECT_DATABASE_URL }}
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-e2e-nextauth-secret
          GOOGLE_CLIENT_ID: ci-e2e-google-client-id
          GOOGLE_CLIENT_SECRET: ci-e2e-google-client-secret
